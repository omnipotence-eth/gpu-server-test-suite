# NVIDIA H100 SXM 80GB Profile — Data Center GPU (production reference)
# NOT runnable on our hardware. Demonstrates understanding of data center
# GPU specifications and how thresholds differ from consumer GPUs.

gpu_model: "NVIDIA H100 80GB HBM3"

# Hardware specs
vram_total_mib: 81920
pcie_gen_expected: 5
pcie_width_expected: 16
ecc_supported: true
ecc_expected: true
nvlink_expected: true
nvlink_count: 18
tdp_watts: 700

# Test thresholds
thresholds:
  # Thermal limits (Celsius)
  temp_warning_c: 75
  temp_critical_c: 83
  temp_shutdown_c: 90

  # PCIe bandwidth (GiB/s) — theoretical max for Gen5 x16 is ~63 GiB/s
  pcie_h2d_min_gibs: 50.0
  pcie_d2h_min_gibs: 50.0
  pcie_retransmit_max: 0

  # Memory — HBM3 bandwidth is ~2 TB/s (H100 SXM)
  vram_test_allocation_pct: 90
  memory_bandwidth_min_gibs: 2000.0

  # Compute stress
  stress_duration_seconds: 120
  stress_min_utilization_pct: 95
  sm_target_gflops: 60000
  sm_tolerance_pct: 10

  # Power
  power_target_pct: 90
  power_duration_seconds: 60
  power_tolerance_pct: 5
