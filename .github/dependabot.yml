version: 2
updates:
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      core-deps:
        patterns: ["prometheus-client", "docker", "psutil"]
      dev-deps:
        patterns: ["ruff", "pytest*", "pre-commit"]
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
